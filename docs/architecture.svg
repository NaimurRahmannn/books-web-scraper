<svg xmlns="http://www.w3.org/2000/svg" width="760" height="820" viewBox="0 0 760 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#111">
    Books Data Engineering System — Architecture
  </text>
  <text x="380" y="56" text-anchor="middle" font-size="12" fill="#555">
    Triggered via Scrapyd API (POST /schedule.json) · runs inside Docker on port 6800
  </text>

  <!-- ===== Main vertical flow ===== -->

  <!-- homepage -->
  <rect x="220" y="80" width="320" height="50" rx="8" fill="#ffffff" stroke="#222" stroke-width="1.5"/>
  <text x="380" y="103" text-anchor="middle" font-size="13" font-weight="600" fill="#111">books.toscrape.com homepage</text>
  <text x="380" y="120" text-anchor="middle" font-size="11" fill="#555">crawl entry point</text>

  <line x1="380" y1="130" x2="380" y2="158" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- parse -->
  <rect x="220" y="160" width="320" height="50" rx="8" fill="#ffffff" stroke="#222" stroke-width="1.5"/>
  <text x="380" y="183" text-anchor="middle" font-size="13" font-weight="600" fill="#111">parse()</text>
  <text x="380" y="200" text-anchor="middle" font-size="11" fill="#555">dynamically discover all categories (sidebar)</text>

  <line x1="380" y1="210" x2="380" y2="238" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- count_category -->
  <rect x="220" y="240" width="320" height="50" rx="8" fill="#ffffff" stroke="#222" stroke-width="1.5"/>
  <text x="380" y="263" text-anchor="middle" font-size="13" font-weight="600" fill="#111">count_category()</text>
  <text x="380" y="280" text-anchor="middle" font-size="11" fill="#555">keep categories with ≥ 5 books, pick 5 at random</text>

  <line x1="380" y1="290" x2="380" y2="318" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- parse_category -->
  <rect x="220" y="320" width="320" height="50" rx="8" fill="#ffffff" stroke="#222" stroke-width="1.5"/>
  <text x="380" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#111">parse_category()</text>
  <text x="380" y="360" text-anchor="middle" font-size="11" fill="#555">follow pagination, sample 5 books per category</text>

  <line x1="380" y1="370" x2="380" y2="398" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- parse_book -->
  <rect x="220" y="400" width="320" height="50" rx="8" fill="#ffffff" stroke="#222" stroke-width="1.5"/>
  <text x="380" y="423" text-anchor="middle" font-size="13" font-weight="600" fill="#111">parse_book()  →  BookItem</text>
  <text x="380" y="440" text-anchor="middle" font-size="11" fill="#555">title · price · availability · product_url · image_url · category</text>

  <line x1="380" y1="450" x2="380" y2="478" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CleaningPipeline -->
  <rect x="220" y="480" width="320" height="58" rx="8" fill="#ffffff" stroke="#222" stroke-width="1.5"/>
  <text x="380" y="503" text-anchor="middle" font-size="13" font-weight="600" fill="#111">CleaningPipeline</text>
  <text x="380" y="520" text-anchor="middle" font-size="11" fill="#555">trim · normalize · strip £ → float</text>
  <text x="380" y="534" text-anchor="middle" font-size="11" fill="#555">availability → boolean</text>

  <!-- branch arrows -->
  <line x1="300" y1="538" x2="200" y2="588" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="538" x2="560" y2="588" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SQLitePipeline -->
  <rect x="60" y="590" width="280" height="58" rx="8" fill="#ffffff" stroke="#222" stroke-width="1.5"/>
  <text x="200" y="613" text-anchor="middle" font-size="13" font-weight="600" fill="#111">SQLitePipeline</text>
  <text x="200" y="630" text-anchor="middle" font-size="11" fill="#555">clear table · INSERT OR IGNORE</text>
  <text x="200" y="644" text-anchor="middle" font-size="11" fill="#555">(UNIQUE product_url)</text>

  <!-- Feed Exports -->
  <rect x="440" y="590" width="260" height="58" rx="8" fill="#ffffff" stroke="#222" stroke-width="1.5"/>
  <text x="570" y="613" text-anchor="middle" font-size="13" font-weight="600" fill="#111">Scrapy Feed Exports</text>
  <text x="570" y="634" text-anchor="middle" font-size="11" fill="#555">configured in settings.py (FEEDS)</text>

  <line x1="200" y1="648" x2="200" y2="690" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="648" x2="570" y2="690" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DB output -->
  <rect x="100" y="692" width="200" height="48" rx="8" fill="#ffffff" stroke="#222" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="200" y="715" text-anchor="middle" font-size="13" font-weight="600" fill="#111">SQLite database</text>
  <text x="200" y="731" text-anchor="middle" font-size="11" fill="#555">output/books.db</text>

  <!-- file outputs -->
  <rect x="455" y="676" width="230" height="32" rx="6" fill="#ffffff" stroke="#222" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="570" y="697" text-anchor="middle" font-size="12" font-weight="600" fill="#111">output/books.json</text>

  <rect x="455" y="714" width="230" height="32" rx="6" fill="#ffffff" stroke="#222" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="570" y="735" text-anchor="middle" font-size="12" font-weight="600" fill="#111">output/books.csv</text>

  <rect x="455" y="752" width="230" height="32" rx="6" fill="#ffffff" stroke="#222" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="570" y="773" text-anchor="middle" font-size="12" font-weight="600" fill="#111">output/books.xml</text>
</svg>
